server {
    listen 80;
    server_tokens off;

    location /api/ {
        proxy_pass http://backend:8000/api/;
    }

    location /admin/ {
        proxy_pass http://backend:8000/admin/;
    }

    location /media/ {
        root /app/;
    }

    location / {
        root /staticfiles/;
        index  index.html index.htm;
        try_files $uri /index.html;
    }

    location /static/ {
        root /staticfiles/;
    }
}