version: '3'

volumes:
  static:
  media:
  pg_data:

services:
  db:
    image: postgres:13
    container_name: postgres
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    image: konyakhinaaleksandra/kittygram_backend
    container_name: backend
    env_file: .env
    volumes:
      - static:/app/static_backend/
      - media:/app/media/
    depends_on:
      - db

  frontend:
    image: konyakhinaaleksandra/kittygram_frontend
    container_name: frontend
    volumes:
      - static:/app/result_build/build/
    depends_on:
      - backend

  gateway:
    image: konyakhinaaleksandra/kittygram_gateway
    container_name: gateway
    ports:
      - "9000:80"
    volumes:
      - static:/staticfiles/
      - media:/app/media/
    depends_on:
      - frontend
      - backend